  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #ec4899;
      --purple: #a855f7;
      --accent: linear-gradient(135deg, #ec4899, #a855f7);
    }
    body { font-family: 'Inter', sans-serif; background: white; color: #000; overflow-x: hidden; }
    .font-serif { font-family: "Playfair Display", serif; }
    .accent-text { background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.1rem;
      border-radius: 999px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-purple { background: var(--accent); color: white; }
    
    .section { padding: 8rem 0; }
    
    .card {
      border-radius: 1.5rem;
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <!-- GTM (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T27QXCSD" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <!-- Modular Sections -->
  <div id="header"></div>
  <main>

    <div id="case-studies"></div>
    <div id="distributor"></div>
    <div id="supplier"></div>
    <div id="testimonials"></div>
    <div id="insights"></div>
  </main>
  <div id="footer"></div>

  <!-- Component Loader -->
  <script src="assets/js/component-loader.js"></script>
  <!-- Tracking & Funnel Engine -->
  <script src="assets/js/tracking-engine.js"></script>

  <script>
    // Reveal Observer setup
    window.observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
        }
      });
    }, { threshold: 0.1 });
  </script>
</body>
