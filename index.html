              return method === "push" ? function() {
                var args; (args = window._klOnsite).push.apply(args, arguments);
              } : function() {
                var n = arguments.length, o = new Array(n);
                for (var i = 0; i < n; i++) o[i] = arguments[i];
                var callback = typeof o[o.length - 1] === "function" ? o.pop() : void 0;
                var promise = new Promise(function(resolve) {
                  window._klOnsite.push([method].concat(o, [function(result){
                    if(callback) callback(result);
                    resolve(result);
                  }]));
                });
                return promise;
              };
            }
          });
        } catch(e) {
          window.klaviyo = window.klaviyo || [];
          window.klaviyo.push = function(){

        }

  <main id="section-root" aria-live="polite"></main>

  <script>
    const sectionManifest = [
      'hero',
      'solutions',
      'lead-magnet',
      'case-studies',
      'distributor',
      'supplier',
      'testimonials',
      'insights',
      'footer'
    ];

    const pushGtmEvent = (eventName, payload = {}) => {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ event: eventName, ...payload });
    };

    const trackKlaviyoLead = (form, formData) => {
      const email = formData.get('email');
      const list = form.dataset.klaviyoList;
      const tags = (form.dataset.klaviyoTags || '').split(',').map((tag) => tag.trim()).filter(Boolean);
      const properties = Object.fromEntries(formData.entries());
      const profile = { email, $email: email, list, tags, ...properties };
      const eventPayload = { list, tags, properties };

      if (window.klaviyo) {
        if (typeof window.klaviyo.identify === 'function') window.klaviyo.identify(profile);
        if (typeof window.klaviyo.track === 'function') window.klaviyo.track('Lead Captured', eventPayload);
        if (typeof window.klaviyo.push === 'function') {
          window.klaviyo.push(['identify', profile]);
          window.klaviyo.push(['track', 'Lead Captured', eventPayload]);
        }
      }

      document.dispatchEvent(new CustomEvent('UnitedSpiritsLeadCaptured', { detail: eventPayload }));
    };

    const bindConversionHooks = () => {
      document.querySelectorAll('.lead-form').forEach((form) => {
        if (form.dataset.bound === 'true') return;
        form.dataset.bound = 'true';
        form.addEventListener('submit', (event) => {
          event.preventDefault();
          const formData = new FormData(form);
          const gtmEvent = form.dataset.gtmEvent;
          trackKlaviyoLead(form, formData);
          if (gtmEvent) pushGtmEvent(gtmEvent, { klaviyo_list: form.dataset.klaviyoList, klaviyo_tags: form.dataset.klaviyoTags });
          const status = form.querySelector('.form-status');
          if (status) status.textContent = 'Thanks — your details have been captured and our team will follow up.';
          const downloadUrl = form.dataset.download;
          if (downloadUrl) window.open(downloadUrl, '_blank', 'noopener');
          form.reset();
        });
      });

      document.querySelectorAll('.brochure-download').forEach((link) => {
        if (link.dataset.bound === 'true') return;
        link.dataset.bound = 'true';
        link.addEventListener('click', () => pushGtmEvent(link.dataset.event || 'BrochureDownloadClick', { href: link.getAttribute('href') }));
      });
    };

    const sectionErrorMarkup = (section, message) => `
      <section class="section bg-white" data-section-error="${section}">
        <div class="mx-auto max-w-3xl px-6 text-center">
          <h2 class="font-serif text-3xl text-gray-900">United Spirits HK</h2>
          <p class="mt-4 text-gray-600">The ${section} section could not be loaded. Please refresh the page or contact info@unitedspiritshk.com.</p>
          <p class="mt-2 text-xs text-gray-400">${message}</p>
        </div>
      </section>`;

    const loadSection = async (section) => {
      const sectionUrl = new URL(`sections/${section}.html`, window.location.href);
      const response = await fetch(sectionUrl.href, { cache: 'no-cache' });
      if (!response.ok) throw new Error(`HTTP ${response.status} for ${sectionUrl.pathname}`);
      return response.text();
    };

    const loadSections = async () => {
      const root = document.getElementById('section-root');
      const fragments = await Promise.all(sectionManifest.map(async (section) => {
        try {
          return await loadSection(section);
        } catch (error) {
          console.error(`Unable to load ${section}.html`, error);
          return sectionErrorMarkup(section, error.message);
        }
      }));
      root.innerHTML = fragments.join('\n');
      bindConversionHooks();
    };

    document.addEventListener('DOMContentLoaded', loadSections);
  </script>
