<section id="distributor" class="section bg-white">
  <div class="mx-auto grid max-w-7xl gap-10 px-6 lg:grid-cols-2 lg:items-start">
    <div>
      <p class="text-sm font-semibold uppercase tracking-widest text-pink-500">Distributor funnel</p>
      <h2 class="mt-3 font-serif text-4xl text-gray-900 sm:text-5xl">Become a distributor partner</h2>
      <p class="mt-5 text-lg leading-8 text-gray-600">Tell us where you operate, which channels you serve, and your expected case volume so our team can qualify fit and follow up quickly.</p>
    </div>
    <form class="lead-form card grid gap-5 p-8" data-klaviyo-list="Distributor Leads" data-klaviyo-tags="distributor" data-gtm-event="DistributorFormSubmit" data-klaviyo-flow="Distributor Application" data-lead-score="20" data-pipeline-stage="Qualified Lead">
      <div><label class="block text-sm font-semibold text-gray-700" for="distributor-company">Company Name</label><input id="distributor-company" name="company_name" required class="mt-2 w-full rounded-xl border border-gray-300 px-4 py-3" /></div>
      <div><label class="block text-sm font-semibold text-gray-700" for="distributor-region">Country/Region</label><input id="distributor-region" name="country_region" required class="mt-2 w-full rounded-xl border border-gray-300 px-4 py-3" /></div>
      <div><label class="block text-sm font-semibold text-gray-700" for="distributor-channels">Distribution Channels</label><textarea id="distributor-channels" name="distribution_channels" required rows="3" class="mt-2 w-full rounded-xl border border-gray-300 px-4 py-3" placeholder="Retail, HoReCa, wholesale, ecommerce..."></textarea></div>
      <div><label class="block text-sm font-semibold text-gray-700" for="distributor-volume">Annual Volume (cases)</label><input id="distributor-volume" name="annual_volume_cases" type="number" min="0" required class="mt-2 w-full rounded-xl border border-gray-300 px-4 py-3" /></div>
      <div><label class="block text-sm font-semibold text-gray-700" for="distributor-email">Email</label><input id="distributor-email" name="email" type="email" required class="mt-2 w-full rounded-xl border border-gray-300 px-4 py-3" /></div>
      <button type="submit" class="btn btn-purple justify-center">Submit Distributor Application</button>
      <p class="form-status text-sm text-gray-600" aria-live="polite">Submissions are routed to Klaviyo list: Distributor Leads with tag distributor.</p>
    </form>
  </div>
</section>
