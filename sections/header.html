<script>
  // Quick script for mobile menu in component
  (function() {
    const btn = document.getElementById('mobileMenuButton');
    const header = document.querySelector('header');
    
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('scrolled', 'bg-white/80', 'backdrop-blur-md', 'shadow-sm');
        header.querySelectorAll('.text-white').forEach(el => el.classList.replace('text-white', 'text-black'));
      } else {
        header.classList.remove('scrolled', 'bg-white/80', 'backdrop-blur-md', 'shadow-sm');
        header.querySelectorAll('.text-black').forEach(el => el.classList.replace('text-black', 'text-white'));
      }
    });
  })();
</script>
